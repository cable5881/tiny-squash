<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinySquash — 管理后台</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./admin.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">🍊 Admin Dashboard</p>
          <h1 class="hero-title">TinySquash 管理后台</h1>
          <p class="hero-copy">查看全量用户信息、访问记录与套餐配置</p>
        </div>
        <div class="hero-actions">
          <a href="/" class="ghost-btn">← 返回首页</a>
        </div>
      </header>

      <div id="admin-loading" class="admin-loading">
        <div class="loading-spinner"></div>
        <p>正在验证权限...</p>
      </div>
      <div id="admin-denied" class="admin-denied hidden">
        <div class="panel" style="max-width: 400px; margin: 0 auto; text-align: center;">
          <div style="font-size: 3rem; margin-bottom: 16px;">⛔</div>
          <h2 style="margin: 0 0 12px;">无权访问</h2>
          <p style="color: var(--muted); margin: 0 0 24px;">仅管理员可查看管理后台。</p>
          <a href="/" class="primary-btn">返回首页</a>
        </div>
      </div>

      <main id="admin-content" class="admin-content hidden">

        <!-- ====== 套餐配置 ====== -->
        <section class="panel">
          <div class="panel-title-row">
            <h3>套餐权益配置</h3>
            <button id="plans-save" class="primary-btn" style="padding:8px 20px; font-size:0.88rem;">保存配置</button>
          </div>
          <p style="color:var(--muted); font-size:0.88rem; margin:4px 0 16px;">修改后点击"保存配置"即时生效。daily_limit 设为 -1 表示无限。</p>
          <div id="plans-container" class="plans-config-grid"></div>
          <div id="plans-msg" class="plans-msg hidden"></div>
        </section>

        <!-- ====== 用户管理 ====== -->
        <section class="panel">
          <div class="panel-title-row">
            <h3>全量用户 <span id="user-total" class="badge">0</span></h3>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>头像</th>
                  <th>昵称</th>
                  <th>邮箱</th>
                  <th>角色</th>
                  <th>套餐</th>
                  <th>注册时间</th>
                  <th>最后更新</th>
                </tr>
              </thead>
              <tbody id="user-tbody"></tbody>
            </table>
          </div>
          <div class="pagination">
            <button id="user-prev" class="ghost-btn" disabled>上一页</button>
            <span id="user-page-info" class="page-info">第 1 页</span>
            <button id="user-next" class="ghost-btn" disabled>下一页</button>
          </div>
        </section>

        <!-- ====== 访问记录 ====== -->
        <section class="panel">
          <div class="panel-title-row">
            <h3>访问记录 <span id="visit-total" class="badge">0</span></h3>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>昵称</th>
                  <th>邮箱</th>
                  <th>角色</th>
                  <th>IP</th>
                  <th>User-Agent</th>
                  <th>访问时间</th>
                </tr>
              </thead>
              <tbody id="visit-tbody"></tbody>
            </table>
          </div>
          <div class="pagination">
            <button id="visit-prev" class="ghost-btn" disabled>上一页</button>
            <span id="visit-page-info" class="page-info">第 1 页</span>
            <button id="visit-next" class="ghost-btn" disabled>下一页</button>
          </div>
        </section>
      </main>

      <footer class="footer-note">
        <p>© 2026 TinySquash · 管理后台</p>
      </footer>
    </div>
  </body>
</html>
